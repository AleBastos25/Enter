# Runtime configuration for multi-page processing, timeouts, and resource limits
# v2: No-embeddings, LLM-assistido, 100% genérico
multi_page: false  # Single-page mode for speed

timeouts:
  per_document_seconds: 2.0  # Máximo 2s por PDF (requisito)
  per_page_seconds: 1.8  # Budget per page (deixar margem para LLM)
  llm_total_seconds: 1.5  # LLM timeout agressivo (já configurado em llm.yaml)

limits:
  max_pages: 1  # Single-page only for speed (máximo 2s por PDF)
  max_blocks_per_page: 1500  # Reduzido para garantir ≤2s
  max_blocks_indexed_per_page: 0  # Embeddings desabilitados
  max_candidates_per_field_page: 3  # Reduzido para garantir ≤2s
  max_total_candidates_per_field: 10  # Reduzido para garantir ≤2s

early_stop:
  # stop when all fields reach minimum confidence
  min_confidence_per_field: 0.75  # Mais permissivo para early-stop mais rápido
  # skip current page if no "signal" of field appears (embeddings desabilitados, não aplicável)
  page_skip_if_no_signal: false  # Embeddings desabilitados, não usar signal
  page_signal_threshold: 0.35  # Não usado (embeddings desabilitados)
  page_signal_topk: 3  # Não usado (embeddings desabilitados)

memory:
  embedding_eviction_pages: 3  # keep index of only N most recent pages
  block_text_max_chars: 400

# v3: Assignment constraints
assignment:
  prefer_same_line_weight: 0.20
  prefer_same_table_col_weight: 0.25
  section_scope_bonus: 0.15
  conflict_penalty: 0.50
  min_field_score: 0.60  # Below this, prefer null + retry
  use_second_best_if_normalization_fails: true

# v3: DocProfile thresholds
profile:
  footer_penalty: 0.35
  grid_min_consistency: 0.6
  max_region_text_chars: 300

