columns:
  enabled: true
  max_k: 3
  min_col_width_norm: 0.12
  min_gap_x_norm: 0.05
matching:
  use_assignment: false  # Enable global assignment layer (optimal transport)
  assignment:
    alpha: 0.7  # Weight for semantic similarity
    beta: 0.3   # Weight for spatial priors
    use_sinkhorn: true  # Use Sinkhorn (true) or Hungarian (false)
    topk: 6     # Top-K columns per row
    null_score: 0.35  # Similarity threshold for null column
  cross_column_penalty: 0.06
  cross_section_penalty: 0.04
  prefer_same_column_bonus: 0.08
  prefer_same_paragraph_bonus: 0.03
  prefer_same_section_bonus: 0.05
reading:
  line_join_y_overlap: 0.6
  make_line_nodes: true
sections:
  enabled: true
  min_above_gap_lines: 1.3
  title_font_boost: 1.15
