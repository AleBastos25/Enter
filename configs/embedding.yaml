budget:
  batch_size: 64
  max_calls_per_pdf: 100
cache:
  dir: .cache/embeddings
  persist: true
dim: 384
enabled: false  # Desligado por padrão - usar LLM + layout-first
index:
  max_blocks_considered: 2000
  min_sim_threshold: 0.35
  svd:
    enabled: true
    min_size: 500
    n_components: null
    variance_threshold: 0.95
  top_k_per_field: 6
model: all-MiniLM-L6-v2
preproc:
  collapse_spaces: true
  drop_short_tokens_under: 2
  lowercase: true
  max_chars_per_block: 300
  strip_accents: true
provider: none  # Força a não carregar nada pesado
