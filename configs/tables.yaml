kv:
  enabled: true
  min_row_items: 2  # mínimo de pares (label, valor) para considerar KV-list
  min_rows: 2
  max_label_len_chars: 40
  label_value_x_gap_max: 0.08  # em unidades normalizadas
  same_row_y_overlap: 0.60
  same_column_x_overlap: 0.55

grid:
  enabled: true
  use_pdf_lines: true  # tenta usar linhas vetoriais (PyMuPDF page.get_drawings)
  min_cols: 2
  min_rows: 2
  min_cell_w_norm: 0.06
  min_cell_h_norm: 0.012
  snap_tol_norm: 0.006  # tolerância para "snap" de bordas
  header_font_boost: 1.1  # > mediana font_size para considerar header
  min_row_y_gap: 0.008  # separação vertical mínima entre linhas

rank:
  prefer_same_row_bonus: 0.12
  prefer_same_col_bonus: 0.06
  cross_row_penalty: 0.06
  cross_col_penalty: 0.04
  relation_weight_same_table_row: 0.85  # "força espacial" de same_table_row

